<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>GovLens Admin</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            margin: 0;
            color: #e5e7eb;
        }

        .container {
            width: 85%;
            margin: 40px auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #9ca3af;
            margin-bottom: 30px;
        }

        .card {
            background: #111827;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 15px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
        }

        .approved {
            background-color: rgba(34,197,94,0.15);
            color: #22c55e;
        }

        .review {
            background-color: rgba(234,179,8,0.15);
            color: #eab308;
        }

        .rejected {
            background-color: rgba(239,68,68,0.15);
            color: #ef4444;
        }

        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            background: #1f2937;
        }

        .logout {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background: #ef4444;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        .logout:hover {
            background: #dc2626;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            flex: 1;
            background: #1f2937;
            padding: 15px;
            border-radius: 10px;
        }

        .stat-title {
            font-size: 12px;
            color: #9ca3af;
        }

        .stat-value {
            font-size: 20px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="topbar">
        <div>
            <h1>📊 GovLens Admin</h1>
            <p class="subtitle">AI-assisted verification dashboard</p>
        </div>

        <a href="/logout" class="logout">Logout</a>
    </div>

    <!-- 🔥 Stats（用Controller传的值） -->
    <div class="stats">
        <div class="stat-box">
            <div class="stat-title">Total Applications</div>
            <div class="stat-value" th:text="${total}">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Approved</div>
            <div class="stat-value" th:text="${approved}">0</div>
        </div>

        <div class="stat-box">
            <div class="stat-title">Rejected</div>
            <div class="stat-value" th:text="${rejected}">0</div>
        </div>
    </div>

    <!-- 📋 Applications -->
    <div class="card">
        <h2>Applications</h2>

        <ul>
            <li th:each="r : ${results}"
                th:classappend="
                    ${#strings.contains(r, 'Approved')} ? 'approved' :
                    (${#strings.contains(r, 'Review Needed')} ? 'review' : 'rejected')
                ">

                <span th:text="${r}">Result</span>

                <span class="badge">
                    AI Decision
                </span>

            </li>
        </ul>
    </div>

</div>

</body>
</html>
