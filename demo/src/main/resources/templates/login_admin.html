<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Login</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #111827;
            padding: 40px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .error {
            background: #ef4444;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .back {
            display: block;
            margin-top: 15px;
            color: #9ca3af;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>🔐 Admin Login</h1>

        <!-- ❌ error message -->
        <p class="error" th:if="${error}">
            Invalid username or password
        </p>

        <form action="/login" method="post">

            <input type="text" name="username" placeholder="Username" required>

            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <a href="/" class="back">← Back</a>

    </div>
</div>

</body>
</html>
