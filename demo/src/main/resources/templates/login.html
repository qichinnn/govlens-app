<!DOCTYPE html>
<html>
<head>
    <title>GovLens Access</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #e5e7eb;
        }

        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 18px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 26px;
        }

        p {
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 25px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .citizen {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            color: white;
        }

        .citizen:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(59,130,246,0.4);
        }

        .admin {
            background: transparent;
            border: 1px solid #374151;
            color: #e5e7eb;
        }

        .admin:hover {
            background: #1f2937;
        }

        .logo {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <div class="logo">🌊</div>
        <h1>GovLens</h1>

        <p>Select your access level</p>

        <!-- 🔥 加分句子（已经帮你加好） -->
        <p class="subtitle">
            AI-powered verification system for government services
        </p>

        <!-- 👤 Citizen -->
        <a href="/user-login">
            <button class="btn citizen">Continue as Citizen</button>
        </a>

        <!-- 🔐 Admin -->
        <a href="/login">
            <button class="btn admin">Admin Login</button>
        </a>

    </div>
</div>

</body>
</html>
