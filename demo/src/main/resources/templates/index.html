<!DOCTYPE html>
<html>
<head>
    <title>GovLens AI System</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            margin: 0;
            color: #e5e7eb;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 40px auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .card {
            background: #111827;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            color: #9ca3af;
            display: block;
            margin-top: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
        }

        input[type="file"] {
            margin-top: 10px;
            color: white;
        }

        img {
            margin-top: 10px;
            border-radius: 8px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        #loadingBox {
            display: none;
        }

        .loader {
            border: 5px solid #1f2937;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 15px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #progressBar {
            width: 100%;
            background: #1f2937;
            border-radius: 6px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 8px;
            background: #22c55e;
        }

        .log {
            font-size: 13px;
            margin-top: 6px;
            color: #9ca3af;
        }

        .center {
            text-align: center;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logout {
            color: #ef4444;
            text-decoration: none;
        }
    </style>

    <script>
        function previewImage(event, id) {
            const file = event.target.files[0];

            if (!file) return;

            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById(id).src = reader.result;
            };
            reader.readAsDataURL(file);
        }

        // 🔥 File size check (1MB)
        function checkSize(event) {
            const file = event.target.files[0];

            if (file && file.size > 1024 * 1024) {
                alert("File too large (max 1MB)");
                event.target.value = "";
            }
        }

        function startAI() {
            document.getElementById("loadingBox").style.display = "block";

            let logs = [
                "Connecting to AI...",
                "Uploading documents...",
                "Extracting data...",
                "Calculating confidence...",
                "Detecting fraud risk...",
                "Cross-checking...",
                "Generating final decision..."
            ];

            let i = 0;
            let progress = 0;
            let logBox = document.getElementById("logs");

            let interval = setInterval(() => {
                if (i < logs.length) {
                    let newLog = document.createElement("div");
                    newLog.className = "log";
                    newLog.innerText = logs[i];
                    logBox.appendChild(newLog);
                    i++;
                }

                progress += 14;
                document.getElementById("progress").style.width = progress + "%";

                if (progress >= 100) {
                    clearInterval(interval);
                }

            }, 600);

            setTimeout(() => {
                document.getElementById("form").submit();
            }, 4200);

            return false;
        }
    </script>

</head>

<body>

<div class="container">

    <div class="topbar">
        <h1>🌊 GovLens</h1>
        <a href="/" class="logout">Switch Role</a>
    </div>

    <div class="card">

        <form id="form" action="/analyze" method="post" enctype="multipart/form-data" onsubmit="return startAI()">

            <!-- 👤 Personal Info -->
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Address</label>
            <input type="text" name="address" required>

            <label>Phone Number</label>
            <input type="text" name="phone" required>

            <!-- 📄 Upload -->
            <label>Upload MyKad</label>
            <input type="file" name="mykad" required accept="image/*"
                   onchange="previewImage(event, 'preview1'); checkSize(event)">
            <img id="preview1" width="120"><br>

            <label>Upload Supporting Document</label>
            <input type="file" name="document" required accept="image/*"
                   onchange="previewImage(event, 'preview2'); checkSize(event)">
            <img id="preview2" width="120">

            <button type="submit">Submit Application</button>

        </form>

    </div>

    <div class="card center" id="loadingBox">

        <strong>GovLens AI Processing...</strong>

        <div id="progressBar">
            <div id="progress"></div>
        </div>

        <div class="loader"></div>

        <div id="logs"></div>

    </div>

</div>

</body>
</html>
